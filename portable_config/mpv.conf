
### 行頭のコメント「#」は、その項目が「有効になっていない」ことを意味する。


#input-conf = "~~/input_uosc.conf"
#include = "~~/profiles.conf"
#include = "~~/script-opts.conf"
#use-filedir-conf = yes
#log-file = "~~/cache/mpv.log"


## 映像設定 ##


vo = gpu-next
#gpu-context = d3d11
#d3d11-exclusive-fs = yes
#d3d11-flip = no

hwdec=d3d11va-copy
#hwdec-codecs = h264,hevc,vp8,vp9,av1,ffv1,mpeg2,rawvidfeo,prores,vc1
hwdec-codecs = all

#d3d11-adapter = "NVIDIA GeForce RTX 5070 Ti"
#vulkan-device = "NVIDIA GeForce RTX 5070 Ti"

video-sync=audio


## 基本設定 ##


input-ime = no
#input-ipc-server = mpvpipe
input-builtin-bindings = no
input-media-keys=no
#pause = yes

target-colorspace-hint = no

hr-seek-framedrop = no
watch-later-options = start,vid,aid,sid

#autocreate-playlist = same
directory-mode = ignore
#directory-filter-types = video,audio
#video-exts = avi,flv,m2ts,mkv,mov,mp4,ts,wmv
#image-exts = avif,bmp,jpeg,jpg,jxl,png,webp
#audio-exts = aiff,ape,flac,mp3,ogg,opus,wav

idle = yes
keep-open = yes
#ontop = yes
#title-bar = no
#autofit-smaller = 50%x50%
autofit=432x243
geometry=+1413+402
#auto-window-resize = no


cache = yes
cache-pause=no
#cache-pause-initial=yes
cache-secs = 15
## Uses extra large RAM cache (needs cache=yes to make it useful).
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB
demuxer-cache-wait = yes
#icc-cache = no
icc-cache-dir = "~~/_cache/icc"
#gpu-shader-cache = no
gpu-shader-cache-dir = "~~/_cache/shader"
watch-later-dir = "~~/_cache/watch_later"

#save-position-on-quit = yes

load-context-menu=no
load-select=no

## OSD設定 ##

osd-on-seek = msg
#osd-blur = 1
osd-bar-w = 100
osd-bar-h = 1.8
osd-bar-align-y = -1
osd-color = "#672168"
osd-outline-color = "#EEEEEE"
osd-outline-size = 0.8
osd-font-size = 38
osd-fractions = yes
osd-playing-msg = '${filename}'
osd-duration = 2000
osd-playing-msg-duration = 3000


## オーディオ設定 ##

ao = wasapi
#audio-device = "wasapi/{xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}"
#audio-exclusive = yes

#volume = 100
volume-max = 130
audio-channels = stereo
alang = 'ja,jpn,en,eng'
audio-file-auto = fuzzy



## 動画設定 ##


#icc-profile-auto = yes

#target-prim = display-p3
#target-trc = gamma2.2

#video-sync-max-video-change = 5
interpolation = no
#tscale = sphinx

cscale = spline36
scale = spline36
dscale = spline36
correct-downscaling = yes

#deband = yes
deinterlace = auto

#tone-mapping = hable
#gamut-mapping-mode = clip
hdr-peak-percentile = 99.99
target-colorspace-hint=auto

#loop-playlist=inf


## 画面設定 ##


#load-stats-overlay = no
osc = no
#load-scripts = no


#glsl-shaders-append = "~~/shaders/AMD_FSR_EASU_rgb_RT.glsl"  



## yt-dlp設定 ##

ytdl-raw-options-append=retries=20
ytdl-format=bestvideo+bestaudio/best


## 字幕設定 ##

sub-auto = fuzzy
sub-file-paths = sub;subtitles
sub-codepage = GB18030
slang = 'ja,jpn,en,eng'
subs-fallback = yes

#blend-subtitles = yes

#sub-font = "LXGW WenKai Mono"
sub-font-size = 44
#sub-scale-with-window = no
sub-scale-signs = yes
sub-outline-size = 4
sub-blur = 1
sub-color = '#FFFFFF'
#secondary-sub-color="#FFFFFF"
#sub-back-color = "#641C1C1C"
#sub-shadow-offset = 2
sub-use-margins = yes

#sub-ass-use-video-data = aspect-ratio
#sub-ass-video-aspect-override  = 16:9

#sub-ass-override = force
#sub-ass-scale-with-window = yes
sub-ass-force-margins = yes
#sub-ass-style-overrides = Fontname=LXGW WenKai Mono

#stretch-image-subs-to-screen = yes
#image-subs-video-resolution = yes



## スクリーンショット設定 ##


screenshot-format = png

screenshot-jpeg-quality = 100
#screenshot-jpeg-source-chroma = no
screenshot-png-compression = 4
screenshot-webp-lossless = yes
#screenshot-webp-quality = 100
#screenshot-webp-compression = 0
screenshot-jxl-distance = 0

screenshot-high-bit-depth = no
screenshot-template = '~~/screenshots/MPV-%P-N%n'



## 起動時プロファイル設定 ##


# Editor

[OFF]
vf = 
glsl-shaders = 
video-aspect-override = -1
target-peak = auto

[LDVDeNoise_35mm_Compact]
vf = 
glsl-shaders = 
video-aspect-override = -1
vf-add = scale=576:432
video-aspect-override = 4:3
vf = fps=30:round=near,vapoursynth="~~/vs/LDVDeNoise-35mm-DML.vpy"
glsl-shaders = "~~/shaders/FSRCNNX_x2_16_0_4_1.glsl"

[ToHeart_DVD]
vf = 
glsl-shaders = 
video-aspect-override = -1
vf-add = vapoursynth="~~/vs/ETC_DEINT_EX-cHi8.vpy"
vf-add = fps=30:round=near
vf-add = hqdn3d=6.00:4.50:6.00:4.50
vf-add = scale=720:480
vf-add = vapoursynth="~~/vs/LDVDeNoise-35mm-DML.vpy"
video-aspect-override = 4:3
glsl-shaders = "~~/shaders/FSRCNNX_x2_16_0_4_1.glsl"

[RIFE425Lite_Anime4K]
vf = 
glsl-shaders = 
video-aspect-override = -1
vf = vapoursynth="~~/vs/RIFE_425lite-DML.vpy"
glsl-shaders = "~~/shaders/Anime4K_Restore_CNN_L.glsl"

[cHiDenoise]
vf = 
glsl-shaders = 
video-aspect-override = -1
vf-add = fps=30:round=near
vf-add = scale=1440:1080
video-aspect-override = 16:9
vf-add = vapoursynth="~~/vs/cHiDeNoise_ESRGAN_Lite-NV.vpy"

[Anime4K_MVTool]
vf = 
glsl-shaders = 
video-aspect-override = -1
glsl-shaders-append = "~~/shaders/Anime4K_Clamp_Highlights.glsl"
glsl-shaders-append = "~~/shaders/Anime4K_Restore_CNN_L.glsl"
glsl-shaders-append = "~~/shaders/Anime4K_Upscale_CNN_x2_L.glsl"
glsl-shaders-append = "~~/shaders/Anime4K_Restore_CNN_L.glsl"
glsl-shaders-append = "~~/shaders/Anime4K_Upscale_CNN_x2_L.glsl"
glsl-shaders-append = "~~/shaders/Anime4K_Restore_CNN_L.glsl"
vf-add = vapoursynth="~~/vs/MEMC_MVT_MQ-cHi.vpy"

[AMD_FluidMotion_Frames]
video-aspect-override = -1
vo = gpu-next
gpu-context = d3d11
hwdec=d3d11va
hwdec-codecs = all
d3d11-adapter = "AMD Radeon(TM) Graphics"
vf-append=amf_frc=indicator=no:profile=low:mv-search=native:fallback=yes:future-frame=yes

