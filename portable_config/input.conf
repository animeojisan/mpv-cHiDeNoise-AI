##　重複フレーム削減　##
##　hi：数値を上げるとfps削減大/下げると小（ハイ閾値）：1ブロックでも大きく違ったら“別フレーム”にする線/下げるほど変化にシビア）　##
##　lo：数値を上げるとfps削減小/下げると大（ロー閾値）：“小さな変化”をカウントする線/下げるほど変化にシビア）　##
##　frac：数値を上げるとfps削減大/下げると小（割合）：“変化ありブロック”が画面の何割以上なら別フレームにするか/下げるほど変化にシビア）　##
##　max：数値を上げるとfps削減大/下げると小（割合）：（最大連続ドロップ数）：“落とし続け”を止める安全弁/連続して落とせる枚数の上限）　##
##　keep：数値を上げるとfps削減小/下げると大（保持枚数・猶予）：同一（重複）と判定しても“すぐには落とさず”まず何枚か残す安全弁　##

