## パラメータの後のコメントはサポートされていません。
## オプションと値の間に余分なスペースを入れることはできません。
## https://mpv.io/manual/master/#positioning


# PALがデフォのキャプチャデバイス選択を回避してMTSC優先する。デフォルトはyes
# yesはNTSC優先

prefer_ntsc=yes


# 外部入力キャプチャ用の色レンジ補正
# HDMIレコーダー / 地デジ / MJPEG USBキャプチャ向け
# RTX VSRがリミテッドレンジのキャプチャ映像をフルレンジとして扱うことで発生する、
# 黒浮きや白っぽい映像を抑制します。

extra_mpv_args=--vf=format:colormatrix=bt.709:colorlevels=limited,scale,format=rgba --video-output-levels=full