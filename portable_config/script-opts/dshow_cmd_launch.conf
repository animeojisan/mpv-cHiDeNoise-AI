## パラメータの後のコメントはサポートされていません。
## オプションと値の間に余分なスペースを入れることはできません。
## https://mpv.io/manual/master/#positioning


# PALがデフォのキャプチャデバイス選択を回避してMTSC優先する。デフォルトはyes
# yesはNTSC優先

prefer_ntsc=yes


# 外部入力キャプチャ用 色変換補正
# MJPEG USBキャプチャをFullレンジ / BT.601としてRGB化し、
# RTX VSR使用時もフィルターなし状態と同じ色調を維持します。
extra_mpv_args=--vf=lavfi=[scale=in_range=pc:out_range=pc:in_color_matrix=bt601,format=rgba] --video-output-levels=full

# HDMIレコーダー / 地デジ / MJPEG USBキャプチャで、
# それでも黒が浮く場合のみ、下記のlimited補正を試してください。
# ただし環境によっては黒潰れ・白飛びが出る場合があります。
#extra_mpv_args=--vf=format:colormatrix=bt.709:colorlevels=limited,scale,format=rgba --video-output-levels=full
